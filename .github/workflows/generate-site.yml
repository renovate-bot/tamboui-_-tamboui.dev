name: Generate Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  generate-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      builtdocs: tamboui/docs/build/docs
      sitedocs: tamboui.dev/docs/main
    
    steps:
      - name: Checkout tamboui.dev
        uses: actions/checkout@v4
        with:
          path: tamboui.dev
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout gh-pages branch
        run: |
          cd tamboui.dev
          git fetch origin gh-pages:gh-pages || true
          git checkout gh-pages || git checkout -b gh-pages
      
      - name: Copy main branch files to gh-pages
        run: |
          cd tamboui.dev
          # Copy files from main branch (excluding demos, which will be updated separately)
          cp ../main-branch-files/* . 2>/dev/null || true 
      - name: Commit and push to gh-pages
        run: |
          cd tamboui.dev
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Update site files and demo videos [skip ci]"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi

