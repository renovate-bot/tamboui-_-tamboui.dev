name: Generate Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  generate-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: write

    
    steps:
      - name: Checkout tamboui.dev (main branch)
        uses: actions/checkout@v4
        with:
          path: tamboui.dev
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      
      - name: Save main branch files
        run: |
          cd tamboui.dev
          mkdir -p ../main-files
          cp * ../main-files/ 2>/dev/null || true
          rm ../main-files/README.md || true
          
      - name: Checkout gh-pages branch
        run: |
          cd tamboui.dev
          git fetch origin gh-pages:gh-pages || true
          git checkout gh-pages || git checkout -b gh-pages
      
      - name: Copy main branch files to gh-pages
        run: |
          cd tamboui.dev
          # Copy files from main branch, leaving other gh-pages files intact
          cp ../main-files/* . 2>/dev/null || true
          rm -rf ../main-files 
      - name: Commit and push to gh-pages
        run: |
          cd tamboui.dev
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Update site files and demo videos [skip ci]"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi

